<!doctype html>
<html lang="ru">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Футбольный менеджер</title>
    <script>
      ;(() => {
        window.VUE_DEVTOOLS_CONFIG = {
          ...window.VUE_DEVTOOLS_CONFIG,
          openInEditorHost: '/fm_simulator/',
        }

        const redirectKey = 'fm-simulator:404-path'

        try {
          const redirectPath = window.sessionStorage.getItem(redirectKey)
          window.sessionStorage.removeItem(redirectKey)

          if (
            redirectPath &&
            redirectPath.startsWith('/fm_simulator/') &&
            window.location.pathname === '/fm_simulator/'
          ) {
            window.history.replaceState(null, '', redirectPath)
          }
        } catch {
          // The app still opens at its root when sessionStorage is unavailable.
        }
      })()
    </script>
  </head>
  <body>
    <div id="app"></div>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
